<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AlgoViz Sorting Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>AlgoViz Sorting Algorithm Visualizer</header>

<div class="controls">
  <button onclick="generateArray()">Generate</button>
  <button onclick="bubbleSort()">Bubble Sort</button>
  <button onclick="selectionSort()">Selection Sort</button>
  <button onclick="mergeSortStart()">Merge Sort</button>

  <label>Size</label>
  <input type="range" min="10" max="100" value="40" id="size" />

  <label>Speed</label>
  <input type="range" min="1" max="100" value="50" id="speed" />
</div>

<div id="array"></div>

<script src="script.js"></script>
</body>
</html>
